<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Unicorn Pink</title>

<style>
    body {
        background: #ffccf2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
    }

    canvas {
        border: 4px solid #ff66cc;
        box-shadow: 0 0 40px rgba(255,105,180,0.5);
        border-radius: 12px;
    }

    h1 {
        color: #ff3399;
        text-shadow: 0 0 10px white;
    }
</style>
</head>

<body>

<h1>PONG UNICORN 🦄</h1>
<canvas id="pongCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("pongCanvas");
const ctx = canvas.getContext("2d");

// Palla (fiocco)
let ballX = canvas.width / 2;
let ballY = canvas.height / 2;
let ballSpeedX = 3;
let ballSpeedY = 3;

// Racchette muffin
const paddleHeight = 100;
const paddleWidth = 10;
let paddle1Y = (canvas.height - paddleHeight) / 2;
let paddle2Y = (canvas.height - paddleHeight) / 2;
const computerLevel = 0.08;

// Score
let score1 = 0;
let score2 = 0;

// Mouse
canvas.addEventListener('mousemove', function(evt) {
    let rect = canvas.getBoundingClientRect();
    let mouseY = evt.clientY - rect.top;
    paddle1Y = mouseY - paddleHeight / 2;
});

function resetBall() {
    ballSpeedX = -ballSpeedX;
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
}

function update() {
    ballX += ballSpeedX;
    ballY += ballSpeedY;

    let center = paddle2Y + paddleHeight / 2;
    paddle2Y += (ballY - center) * computerLevel;

    if (ballY < 0 || ballY > canvas.height) {
        ballSpeedY = -ballSpeedY;
    }

    if (ballX < paddleWidth) {
        if (ballY > paddle1Y && ballY < paddle1Y + paddleHeight) {
            ballSpeedX = -ballSpeedX;
        } else if (ballX < 0) {
            score2++;
            resetBall();
        }
    }

    if (ballX > canvas.width - paddleWidth) {
        if (ballY > paddle2Y && ballY < paddle2Y + paddleHeight) {
            ballSpeedX = -ballSpeedX;
        } else if (ballX > canvas.width) {
            score1++;
            resetBall();
        }
    }
}

// 🎀 Fiocco rosa (pallina)
function drawBow(x, y) {
    ctx.fillStyle = "#ff66cc";

    ctx.beginPath();
    ctx.arc(x - 8, y, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x + 8, y, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
}

// 🧁 Muffin (racchetta)
function drawMuffin(x, y) {
    // base muffin
    ctx.fillStyle = "#d2691e";
    ctx.fillRect(x, y + 20, 20, 40);

    // glassa rosa
    ctx.fillStyle = "#ff99cc";
    ctx.beginPath();
    ctx.arc(x + 10, y + 20, 15, Math.PI, 0);
    ctx.fill();
}

// 🦄 pattern unicorni (semplice decorativo)
function drawBackground() {
    ctx.fillStyle = "#ffc0cb";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255,255,255,0.3)";
    for (let i = 0; i < canvas.width; i += 80) {
        for (let j = 0; j < canvas.height; j += 80) {
            ctx.fillText("🦄", i, j);
        }
    }
}

function draw() {
    drawBackground();

    // linea centrale
    ctx.strokeStyle = "#ff66cc";
    ctx.setLineDash([10, 15]);
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    // muffin racchette
    drawMuffin(0, paddle1Y);
    drawMuffin(canvas.width - 20, paddle2Y);

    // fiocco palla
    drawBow(ballX, ballY);

    // punteggio
    ctx.fillStyle = "#ff3399";
    ctx.font = "bold 30px Arial";
    ctx.fillText(score1, canvas.width / 4, 50);
    ctx.fillText(score2, canvas.width * 3/4, 50);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
