<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Migliorato</title>

<style>
    body {
        background: radial-gradient(circle, #111, #000);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
    }

    canvas {
        border: 3px solid rgba(255,255,255,0.2);
        box-shadow: 0 0 30px rgba(0,255,255,0.2);
        border-radius: 10px;
    }

    h1 {
        font-weight: 200;
        letter-spacing: 3px;
    }
</style>
</head>

<body>

<h1>PONG</h1>
<canvas id="pongCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("pongCanvas");
const ctx = canvas.getContext("2d");

// Palla (più lenta)
let ballX = canvas.width / 2;
let ballY = canvas.height / 2;
let ballSpeedX = 3;
let ballSpeedY = 3;
const ballRadius = 10;

// Racchette
const paddleHeight = 100;
const paddleWidth = 10;
let paddle1Y = (canvas.height - paddleHeight) / 2;
let paddle2Y = (canvas.height - paddleHeight) / 2;
const computerLevel = 0.08;

// Punteggio
let score1 = 0;
let score2 = 0;

// Mouse
canvas.addEventListener('mousemove', function(evt) {
    let rect = canvas.getBoundingClientRect();
    let mouseY = evt.clientY - rect.top;
    paddle1Y = mouseY - paddleHeight / 2;
});

function resetBall() {
    ballSpeedX = -ballSpeedX;
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
}

function update() {
    ballX += ballSpeedX;
    ballY += ballSpeedY;

    // AI più fluida
    let center = paddle2Y + paddleHeight / 2;
    paddle2Y += (ballY - center) * computerLevel;

    // Collisione sopra/sotto (fix corretto)
    if (ballY - ballRadius < 0 || ballY + ballRadius > canvas.height) {
        ballSpeedY = -ballSpeedY;
    }

    // Sinistra
    if (ballX < paddleWidth) {
        if (ballY > paddle1Y && ballY < paddle1Y + paddleHeight) {
            ballSpeedX = -ballSpeedX;

            let deltaY = ballY - (paddle1Y + paddleHeight / 2);
            ballSpeedY = deltaY * 0.25;
        } else if (ballX < 0) {
            score2++;
            resetBall();
        }
    }

    // Destra
    if (ballX > canvas.width - paddleWidth) {
        if (ballY > paddle2Y && ballY < paddle2Y + paddleHeight) {
            ballSpeedX = -ballSpeedX;

            let deltaY = ballY - (paddle2Y + paddleHeight / 2);
            ballSpeedY = deltaY * 0.25;
        } else if (ballX > canvas.width) {
            score1++;
            resetBall();
        }
    }
}

function draw() {
    // Sfondo gradient
    let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    gradient.addColorStop(0, "#000");
    gradient.addColorStop(1, "#0a0a2a");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Glow
    ctx.shadowBlur = 15;
    ctx.shadowColor = "white";

    // Linea centrale
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.setLineDash([10, 15]);
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    // Racchette
    ctx.fillStyle = "#00e5ff";
    ctx.fillRect(0, paddle1Y, paddleWidth, paddleHeight);

    ctx.fillStyle = "#ff4081";
    ctx.fillRect(canvas.width - paddleWidth, paddle2Y, paddleWidth, paddleHeight);

    // Palla glow
    ctx.beginPath();
    ctx.fillStyle = "white";
    ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
    ctx.fill();

    // Reset glow per testo
    ctx.shadowBlur = 0;

    // Punteggio
    ctx.fillStyle = "white";
    ctx.font = "bold 32px Segoe UI";
    ctx.fillText(score1, canvas.width / 4, 50);
    ctx.fillText(score2, canvas.width * 3/4, 50);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
