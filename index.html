<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Neon Pink</title>

<style>
    body {
        background: radial-gradient(circle, #1a002a, #000);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
    }

    canvas {
        border: 3px solid rgba(255,255,255,0.1);
        box-shadow: 0 0 40px rgba(255,0,150,0.3);
        border-radius: 12px;
    }

    h1 {
        font-weight: 200;
        letter-spacing: 4px;
        color: #ff66cc;
        text-shadow: 0 0 10px #ff66cc;
    }
</style>
</head>

<body>

<h1>PONG</h1>
<canvas id="pongCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("pongCanvas");
const ctx = canvas.getContext("2d");

// Palla
let ballX = canvas.width / 2;
let ballY = canvas.height / 2;
let ballSpeedX = 3;
let ballSpeedY = 3;

// Racchette
const paddleHeight = 100;
const paddleWidth = 10;
let paddle1Y = (canvas.height - paddleHeight) / 2;
let paddle2Y = (canvas.height - paddleHeight) / 2;
const computerLevel = 0.08;

// Punteggio
let score1 = 0;
let score2 = 0;

// Mouse
canvas.addEventListener('mousemove', function(evt) {
    let rect = canvas.getBoundingClientRect();
    let mouseY = evt.clientY - rect.top;
    paddle1Y = mouseY - paddleHeight / 2;
});

function resetBall() {
    ballSpeedX = -ballSpeedX;
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
}

function update() {
    ballX += ballSpeedX;
    ballY += ballSpeedY;

    // AI fluida
    let center = paddle2Y + paddleHeight / 2;
    paddle2Y += (ballY - center) * computerLevel;

    // Collisione sopra/sotto
    if (ballY < 0 || ballY > canvas.height) {
        ballSpeedY = -ballSpeedY;
    }

    // Sinistra
    if (ballX < paddleWidth) {
        if (ballY > paddle1Y && ballY < paddle1Y + paddleHeight) {
            ballSpeedX = -ballSpeedX;
            let deltaY = ballY - (paddle1Y + paddleHeight / 2);
            ballSpeedY = deltaY * 0.25;
        } else if (ballX < 0) {
            score2++;
            resetBall();
        }
    }

    // Destra
    if (ballX > canvas.width - paddleWidth) {
        if (ballY > paddle2Y && ballY < paddle2Y + paddleHeight) {
            ballSpeedX = -ballSpeedX;
            let deltaY = ballY - (paddle2Y + paddleHeight / 2);
            ballSpeedY = deltaY * 0.25;
        } else if (ballX > canvas.width) {
            score1++;
            resetBall();
        }
    }
}

function drawBow(x, y) {
    ctx.fillStyle = "#ff2ea6";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff2ea6";

    // Fiocco sinistro
    ctx.beginPath();
    ctx.arc(x - 6, y, 6, 0, Math.PI * 2);
    ctx.fill();

    // Fiocco destro
    ctx.beginPath();
    ctx.arc(x + 6, y, 6, 0, Math.PI * 2);
    ctx.fill();

    // Nodo centrale
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
}

function draw() {
    // Sfondo viola/rosa
    let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    gradient.addColorStop(0, "#0a001a");
    gradient.addColorStop(1, "#2a003f");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Linea centrale
    ctx.strokeStyle = "rgba(255,105,180,0.3)";
    ctx.setLineDash([10, 15]);
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    // Racchetta sinistra
    ctx.fillStyle = "#ff66cc";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#ff66cc";
    ctx.fillRect(0, paddle1Y, paddleWidth, paddleHeight);

    // Racchetta destra
    ctx.fillStyle = "#cc66ff";
    ctx.shadowColor = "#cc66ff";
    ctx.fillRect(canvas.width - paddleWidth, paddle2Y, paddleWidth, paddleHeight);

    // Pallina = fiocco
    drawBow(ballX, ballY);

    // Reset glow
    ctx.shadowBlur = 0;

    // Punteggio
    ctx.fillStyle = "#ffccff";
    ctx.font = "bold 32px Segoe UI";
    ctx.fillText(score1, canvas.width / 4, 50);
    ctx.fillText(score2, canvas.width * 3/4, 50);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
